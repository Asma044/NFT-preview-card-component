<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>NFT card</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main>
            <div class="card">
                <img class="img" src="image-equilibrium.jpg" alt="">
                    <h1>Equilibrium #3429</h1>
                    <p class="description"> Our Equilibrium collection promotes balance and calm </p>
                    <div class="ethr">
                        <p class="ETH"><img src="icon-ethereum.svg" alt=""> 0.041ETH</p>
                        <p class="clock"><img src="icon-clock.svg" alt=""> 3 days left</p>
                    </div>
                    <div class="ETH_Creator">
                        <img class="avatar" src="image-avatar.png" alt="">
                        <p class="creator">Creation of <span class="name">Jules Wyvern</span></p>
                    </div>
                
            </div>

            </div>
        </main>
    </body>
</html>
